  <!-- Main Content -->
  <main id="main-content" tabindex="-1">
    
    <section class="section contact-section" aria-labelledby="contact-heading">
      <div class="contact-container">
        
        <div class="contact-intro">
          <h1 id="contact-heading">Get in Touch</h1>
          <p class="section-lead">Have a project in mind or need an accessibility compliance consultation? Let's connect.</p>
        </div>

        <div class="card">
          <!-- Form Submission Status Announcer -->
          <div id="form-feedback-alert" class="form-feedback" role="alert" aria-live="assertive"></div>

          <form id="contact-form" action="#" method="POST" novalidate>
            <!-- Name Input -->
            <div class="form-group">
              <label for="contact-name" class="form-label">
                Full Name <span class="required-star" aria-hidden="true">*</span>
                <span class="sr-only">(required)</span>
              </label>
              <input 
                type="text" 
                id="contact-name" 
                name="name" 
                class="form-control" 
                required 
                aria-required="true"
                aria-invalid="false"
                aria-describedby="name-error"
                autocomplete="name"
              >
              <span id="name-error" class="error-msg" aria-live="polite"></span>
            </div>

            <!-- Email Input -->
            <div class="form-group">
              <label for="contact-email" class="form-label">
                Email Address <span class="required-star" aria-hidden="true">*</span>
                <span class="sr-only">(required)</span>
              </label>
              <input 
                type="email" 
                id="contact-email" 
                name="email" 
                class="form-control" 
                required 
                aria-required="true"
                aria-invalid="false"
                aria-describedby="email-error"
                autocomplete="email"
              >
              <span id="email-error" class="error-msg" aria-live="polite"></span>
            </div>

            <!-- Subject Input -->
            <div class="form-group">
              <label for="contact-subject" class="form-label">
                Subject <span class="required-star" aria-hidden="true">*</span>
                <span class="sr-only">(required)</span>
              </label>
              <input 
                type="text" 
                id="contact-subject" 
                name="subject" 
                class="form-control" 
                required 
                aria-required="true"
                aria-invalid="false"
                aria-describedby="subject-error"
              >
              <span id="subject-error" class="error-msg" aria-live="polite"></span>
            </div>

            <!-- Message Textarea -->
            <div class="form-group">
              <label for="contact-message" class="form-label">
                Message <span class="required-star" aria-hidden="true">*</span>
                <span class="sr-only">(required)</span>
              </label>
              <textarea 
                id="contact-message" 
                name="message" 
                class="form-control" 
                required 
                aria-required="true"
                aria-invalid="false"
                aria-describedby="message-error"
              ></textarea>
              <span id="message-error" class="error-msg" aria-live="polite"></span>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
              Send Message
              <svg aria-hidden="true" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/>
              </svg>
            </button>
          </form>
        </div>

      </div>
    </section>
  </main>
